# Sample ~/.agentx/theme/default.yaml
#
# This is a "rich" theme file: a base16 palette plus optional
# overrides. You can also drop a standard flat base16 scheme here
# instead — the loader detects either shape.

name: my-default
displayName: "My Default"
appearance: dark

palette:
  base00: "#191724"
  base01: "#1f1d2e"
  base02: "#26233a"
  base03: "#6e6a86"
  base04: "#908caa"
  base05: "#e0def4"
  base06: "#e0def4"
  base07: "#524f67"
  base08: "#eb6f92"
  base09: "#f6c177"
  base0A: "#ebbcba"
  base0B: "#31748f"
  base0C: "#9ccfd8"
  base0D: "#c4a7e7"
  base0E: "#f6c177"
  base0F: "#524f67"

# Optional: tweak any token without redefining the palette.
overrides:
  colors:
    primary: "#c4a7e7"
  borders:
    default: rounded
